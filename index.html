<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Note Bible</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-title" content="Note Bible">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=IBM+Plex+Sans+KR:wght@300;400;500&family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111111;
  --surface: #1a1a1a;
  --elevated: #222222;
  --text: #e0e0e0;
  --text-dim: #777;
  --text-muted: #555;
  --border: #2a2a2a;
  --divider: #1e1e1e;
  --accent: #ddd;
  --accent-subtle: rgba(255,255,255,0.05);
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --font: 'Noto Sans KR', -apple-system, 'Pretendard', 'Segoe UI', system-ui, sans-serif;
}

html { color-scheme: dark; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }

body { display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; height: 100dvh; overflow: hidden; }

/* === LOADING STATE === */
.loading-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); gap: 16px;
  transition: opacity 0.4s;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text-dim);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-muted); }
.loading-error {
  max-width: 340px; text-align: center; padding: 1.5rem;
  font-size: 13px; line-height: 1.7; color: var(--text-dim);
}
.loading-error code {
  display: block; margin-top: 8px; padding: 8px 12px;
  background: var(--surface); border-radius: 6px;
  font-size: 12px; color: var(--text);
}

/* === GLASS FLOATING NAV BAR (bottom) === */
.glass-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: center;
  padding: 0 1.25rem 1.25rem;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
}
.glass-nav-inner {
  pointer-events: auto;
  display: flex; align-items: center; gap: 4px;
  background: rgba(30,30,30,0.85);
  backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 6px 6px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  max-width: 300px; width: auto;
}
.glass-nav-btn {
  width: 42px; height: 42px; flex: 0 0 42px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 16px; font-weight: 400;
  color: rgba(255,255,255,0.45); background: transparent; border: none;
  cursor: pointer; border-radius: 50%;
  transition: transform 0.15s cubic-bezier(0.2,0,0,1), background 0.2s, color 0.15s;
  -webkit-user-select: none; user-select: none;
}
.glass-nav-btn:hover {
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
}
.glass-nav-btn:active {
  transform: scale(0.9);
  background: rgba(255,255,255,0.12);
}
.glass-nav-btn.chapter-btn {
  flex: 0 1 auto; width: auto; border-radius: 18px;
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.9);
  letter-spacing: -0.01em;
  padding: 0 12px; white-space: nowrap;
}
.glass-nav-btn.chapter-btn:hover { background: rgba(255,255,255,0.06); }
.glass-nav-btn:disabled {
  opacity: 0.2; cursor: default; transform: none;
}

/* === MAIN CONTENT === */
.main-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; scrollbar-width: none; }
.main-content::-webkit-scrollbar { display: none; }

/* Reading focus gradients — fixed overlays to avoid scroll gaps */
.gradient-top, .gradient-bottom {
  position: fixed; left: 0; right: 0; height: 140px;
  z-index: 5; pointer-events: none;
  max-width: 900px; margin: 0 auto;
}
.gradient-top {
  top: 0;
  background: linear-gradient(to bottom, #111111 0%, transparent 100%);
}
.gradient-bottom {
  bottom: 0;
  background: linear-gradient(to top, #111111 0%, #111111 20%, transparent 100%);
}

/* === VERSE DISPLAY === */
.verses-wrap {
  padding: 30vh 3rem 10rem;
}
@media (max-width: 768px) {
  .verses-wrap { padding: 28vh 1.75rem 10rem; }
}

.verse-block {
  display: block;
  margin-bottom: 1rem;
}
.verse-block.rhythm-break {
  margin-top: 1.5rem;
  padding-top: 1rem;
}

.verse-num {
  font-size: 0.65rem; font-weight: 600; color: var(--text-muted); opacity: 0.35;
  vertical-align: super; margin-right: 2px; line-height: 1; user-select: none;
}
.verse-text {
  font-size: 1rem; line-height: 1.9; font-weight: 300; cursor: pointer;
  border-radius: 6px; padding: 4px 6px; margin: -4px -6px;
  transition: background 0.2s, transform 0.15s cubic-bezier(0.2,0,0,1);
  letter-spacing: -0.008em;
  display: inline;
}
.verse-text:active { transform: scale(0.985); }
.verse-text:hover { background: var(--accent-subtle); }
.verse-text.selected {
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
}
@keyframes selectPulse {
  0% { background: rgba(255,255,255,0); }
  50% { background: rgba(255,255,255,0.1); }
  100% { background: rgba(255,255,255,0.06); }
}
.verse-text.just-selected { animation: selectPulse 0.4s ease-out; }

/* Note indicator dot on verses with notes */
.verse-block.has-note { position: relative; }
.verse-note-dot {
  display: inline-block; width: 4px; height: 4px;
  background: var(--text-muted); border-radius: 50%;
  margin-left: 4px; vertical-align: middle; opacity: 0.5;
}

/* === SETTINGS PANEL === */
.settings-panel {
  position: fixed; bottom: 70px; left: 0; right: 0; z-index: 45;
  display: flex; justify-content: center;
  padding: 0 1rem;
  pointer-events: none;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.25s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.settings-panel.active {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
.settings-panel-inner {
  background: var(--elevated); border: 1px solid var(--border); border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  max-width: 380px; width: 100%; overflow: hidden;
  max-height: 60vh; overflow-y: auto;
}
.settings-section {
  padding: 12px 16px; border-bottom: 1px solid var(--divider);
}
.settings-section:last-child { border-bottom: none; }
.settings-label {
  font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em;
  margin-bottom: 8px; text-transform: uppercase;
}
.settings-row {
  display: flex; align-items: center; gap: 8px;
}
.settings-btn {
  flex: 1; padding: 8px; text-align: center; font-family: var(--font); font-size: 13px;
  font-weight: 400; color: var(--text-dim); background: none;
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.settings-btn:hover { background: var(--accent-subtle); }
.settings-btn.active { color: var(--text); border-color: var(--text); font-weight: 500; }

.font-option {
  padding: 12px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
  transition: background 0.15s;
}
.font-option:hover { background: var(--accent-subtle); }
.font-option.selected { background: var(--accent-subtle); border-left: 2px solid var(--text); }
.font-option .font-name { font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; }
.font-option .font-preview { font-size: 15px; color: var(--text); line-height: 1.6; }

/* === FLOATING ACTION BAR === */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  padding: 0 1.25rem 1.25rem;
  transform: translateY(20px) scale(0.95);
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
}
.action-bar.active {
  transform: translateY(0) scale(1);
  opacity: 1;
  pointer-events: auto;
}
.action-bar-inner {
  display: flex; align-items: center; gap: 8px;
  max-width: 360px; width: 100%;
  background: rgba(30,30,30,0.85);
  backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 8px 8px 8px 18px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.action-bar .action-ref {
  flex: 1; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.action-bar button {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 10px 16px; border-radius: 18px; cursor: pointer; white-space: nowrap;
  transition: transform 0.12s cubic-bezier(0.2,0,0,1);
}
.action-bar button:active { transform: scale(0.92); }
.action-bar .action-note-btn {
  background: rgba(255,255,255,0.9); border: none; color: #111;
}
.action-bar .action-cancel-btn {
  background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.5);
}

/* === SLIDE NOTE PANEL === */
.note-overlay {
  position: fixed; inset: 0; z-index: 50; opacity: 0; pointer-events: none;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  transition: opacity 0.3s;
}
.note-overlay.active { opacity: 1; pointer-events: auto; }

.note-panel {
  position: fixed; top: 0; right: 0; z-index: 51;
  width: 56%; max-width: 480px; height: 100dvh;
  background: var(--bg); border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
.note-panel.active { transform: translateX(0); }

@media (max-width: 768px) {
  .note-panel { width: 88%; max-width: none; }
}

.note-panel-header {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; gap: 12px;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
.note-panel-header .ref { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-panel-header button {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 4px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; font-family: var(--font);
  white-space: nowrap;
}

.note-panel-body { flex: 1; overflow-y: auto; padding: 1.25rem; padding-bottom: 80px; }

.note-verse-quote {
  font-size: 13px; line-height: 1.7; color: var(--text-dim);
  padding: 12px 14px; background: var(--surface); border-radius: 8px;
  margin-bottom: 16px; border-left: 3px solid var(--border);
  white-space: pre-wrap;
}

.note-panel-footer {
  position: sticky; bottom: 0; z-index: 3;
  padding: 12px 1.25rem;
  background: linear-gradient(to bottom, transparent 0%, var(--bg) 40%);
  padding-top: 24px;
}
.note-add-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px 0;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text-dim); background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: background 0.15s, color 0.15s, transform 0.12s;
}
.note-add-btn:hover { color: var(--text); background: var(--accent-subtle); }
.note-add-btn:active { transform: scale(0.97); }

.note-item-inner {
  cursor: pointer; border-radius: 8px; padding: 4px 0;
  transition: background 0.15s;
}
.note-item-inner:hover { background: var(--accent-subtle); }
.note-item-editing .note-rendered { display: none; }
.note-item-editing .note-item-inner { cursor: default; background: none; }
.note-edit-textarea {
  width: 100%; min-height: 80px; resize: none;
  font-family: var(--font); font-size: 14px; line-height: 1.85;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface); color: var(--text); outline: none;
  margin-top: 8px;
}
.note-edit-textarea:focus { border-color: var(--text-dim); }
.note-edit-actions {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px;
}
.note-edit-actions button {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px; cursor: pointer; border: none;
  transition: transform 0.12s;
}
.note-edit-actions button:active { transform: scale(0.94); }
.note-edit-actions .edit-cancel { background: none; color: var(--text-muted); border: 1px solid var(--border); }
.note-edit-actions .edit-save { background: var(--text); color: var(--bg); }
.note-edit-actions .edit-delete { background: none; color: #c44; border: 1px solid #c44; }

.note-item {
  padding: 1.25rem 0; border-bottom: 1px solid var(--divider);
}
.note-item:last-child { border-bottom: none; }
.note-date {
  font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px;
  letter-spacing: 0.03em;
}
.note-rendered {
  font-size: 14px; line-height: 1.85; color: var(--text); white-space: pre-wrap;
  padding: 0 4px;
}

.note-empty {
  text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 13px; line-height: 1.6;
}

/* Rendered #date divider inside notes */
.note-date-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 1.25rem 0;
}
.note-date-divider::before,
.note-date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.note-date-divider span {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.03em; white-space: nowrap;
}

/* === FULL SCREEN NOTE EDITOR === */
.note-editor {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.note-editor.active { transform: translateY(0); }

.note-editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.note-editor-back {
  font-family: var(--font); font-size: 18px; font-weight: 300;
  color: var(--text-dim); background: none; border: none;
  cursor: pointer; padding: 8px 12px;
  transition: transform 0.12s;
}
.note-editor-back:active { transform: scale(0.9); }
.note-editor-status {
  font-size: 11px; font-weight: 400; color: var(--text-muted);
  letter-spacing: 0.02em;
  opacity: 0; transition: opacity 0.3s;
}
.note-editor-status.visible { opacity: 1; }
.note-editor-ref {
  font-size: 12px; color: var(--text-muted); padding: 10px 20px 0;
  letter-spacing: 0.01em; flex-shrink: 0;
}
.note-editor-body {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}
.note-editor-textarea {
  flex: 1; width: 100%; resize: none;
  font-family: var(--font); font-size: 16px; line-height: 1.9; font-weight: 300;
  padding: 16px 20px 4rem;
  background: transparent; color: var(--text);
  border: none; outline: none;
  letter-spacing: -0.008em;
}
.note-editor-textarea::placeholder { color: var(--text-muted); }
@media (max-width: 768px) {
  .note-editor-textarea { padding: 16px 1.75rem 4rem; }
  .note-editor-ref { padding: 10px 1.75rem 0; }
}

/* === BOOK SELECTOR OVERLAY === */
.book-selector {
  position: fixed; inset: 0; z-index: 60;
  background: var(--bg); display: none; flex-direction: column;
}
.book-selector.active { display: flex; }

.book-selector-header {
  display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px;
}
.book-selector-header button {
  font-family: var(--font); font-size: 13px; background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 8px;
}
.book-selector-header .tabs { display: flex; flex: 1; gap: 0; }
.book-selector-header .tab {
  flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600;
  color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
}
.book-selector-header .tab.active { color: var(--text); border-bottom-color: var(--text); }

.book-selector-body { flex: 1; overflow-y: auto; padding: 12px; }

.book-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px;
}
.book-item {
  padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 500;
  border-radius: 6px; cursor: pointer; color: var(--text);
  border: 1px solid var(--divider);
  transition: background 0.15s, transform 0.12s;
}
.book-item:hover { background: var(--accent-subtle); }
.book-item:active { background: var(--surface); transform: scale(0.97); }

.chapter-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr)); gap: 6px;
}
.chapter-item {
  padding: 12px 6px; text-align: center; font-size: 14px; font-weight: 500;
  border-radius: 6px; cursor: pointer; color: var(--text);
  border: 1px solid var(--divider);
  transition: background 0.15s, transform 0.12s;
}
.chapter-item:hover { background: var(--accent-subtle); }
.chapter-item:active { transform: scale(0.97); }

/* === ALL NOTES VIEW === */
.all-notes-panel {
  position: fixed; inset: 0; z-index: 55;
  background: var(--bg); display: none; flex-direction: column;
}
.all-notes-panel.active { display: flex; }

.all-notes-header {
  display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 12px;
}
.all-notes-header h2 { flex: 1; font-size: 15px; font-weight: 600; }
.all-notes-header button {
  font-family: var(--font); background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 14px; border-radius: 5px; font-size: 12px; cursor: pointer;
}

.all-notes-body { flex: 1; overflow-y: auto; padding: 16px; }

.all-notes-date-group { margin-bottom: 20px; }
.all-notes-date {
  font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em;
  text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--divider);
}
.all-notes-card {
  padding: 12px 0; border-bottom: 1px solid var(--divider); cursor: pointer;
  transition: background 0.15s;
}
.all-notes-card:last-child { border-bottom: none; }
.all-notes-card:hover { background: var(--accent-subtle); margin: 0 -8px; padding: 12px 8px; border-radius: 6px; }
.all-notes-ref { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; }
.all-notes-preview { font-size: 13px; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner" id="loadingSpinner"></div>
  <div class="loading-text" id="loadingText">Loading Bible data...</div>
</div>

<!-- READING FOCUS GRADIENTS (fixed overlays) -->
<div class="gradient-top"></div>
<div class="gradient-bottom"></div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-inner">
    <div class="settings-section">
      <div class="settings-label">Language</div>
      <div class="settings-row">
        <button class="settings-btn active" id="langKo">한글</button>
        <button class="settings-btn" id="langEn">English</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Font</div>
      <div class="font-option selected" data-font="'Noto Sans KR', sans-serif" data-weight="300">
        <span class="font-name">Noto Sans KR Light</span>
        <span class="font-preview" style="font-family:'Noto Sans KR';font-weight:300;">태초에 하나님이 천지를</span>
      </div>
      <div class="font-option" data-font="'IBM Plex Sans KR', sans-serif" data-weight="300">
        <span class="font-name">IBM Plex Sans KR</span>
        <span class="font-preview" style="font-family:'IBM Plex Sans KR';font-weight:300;">태초에 하나님이 천지를</span>

<script>
(function() {
  'use strict';

  // ============================
  // DATABASE (Dexie / IndexedDB)
  // ============================
  var db = new Dexie('BibleNoteDB');
  db.version(1).stores({
    notes: '++id, book, chapter, verse_start, verse_end, date, updated_at'
  });

  // ============================
  // KOREAN BOOK NAMES (66 books, same order as JSON)
  // ============================
  var KOREAN_BOOK_NAMES = [
    '창세기','출애굽기','레위기','민수기','신명기',
    '여호수아','사사기','룻기','사무엘상','사무엘하',
    '열왕기상','열왕기하','역대상','역대하','에스라',
    '느헤미야','에스더','욥기','시편','잠언',
    '전도서','아가','이사야','예레미야','예레미야애가',
    '에스겔','다니엘','호세아','요엘','아모스',
    '오바댜','요나','미가','나훔','하박국',
    '스바냐','학개','스가랴','말라기',
    '마태복음','마가복음','누가복음','요한복음','사도행전',
    '로마서','고린도전서','고린도후서','갈라디아서','에베소서',
    '빌립보서','골로새서','데살로니가전서','데살로니가후서',
    '디모데전서','디모데후서','디도서','빌레몬서','히브리서',
    '야고보서','베드로전서','베드로후서','요한일서',
    '요한이서','요한삼서','유다서','요한계시록'
  ];

  var OT_COUNT = 39;

  // ============================
  // STATE
  // ============================
  var bibleKo = null;
  var bibleEn = null;

  var state = {
    bookIndex: 0,
    chapter: 1,
    lang: 'ko',
    selectedVerses: [],
    fontFamily: "'Noto Sans KR', sans-serif",
    fontWeight: '300',
    fontSize: 16,
    lineHeight: 1.9,
    versePadding: 1,
    sideMargin: 3
  };

  // Editor state
  var editorNoteId = null;
  var editorVerses = null;

  // ============================
  // DOM REFS
  // ============================
  var versesWrap = document.getElementById('versesWrap');
  var bookChapterBtn = document.getElementById('bookChapterBtn');
  var noteOverlay = document.getElementById('noteOverlay');
  var notePanel = document.getElementById('notePanel');
  var notePanelRef = document.getElementById('notePanelRef');
  var notePanelBody = document.getElementById('notePanelBody');
  var bookSelector = document.getElementById('bookSelector');
  var bookSelectorBody = document.getElementById('bookSelectorBody');
  var settingsPanel = document.getElementById('settingsPanel');
  var allNotesPanel = document.getElementById('allNotesPanel');
  var allNotesBody = document.getElementById('allNotesBody');
  var actionBar = document.getElementById('actionBar');
  var actionRef = document.getElementById('actionRef');
  var glassNav = document.getElementById('glassNav');
  var mainContent = document.getElementById('mainContent');
  var loadingScreen = document.getElementById('loadingScreen');
  var loadingText = document.getElementById('loadingText');
  var loadingSpinner = document.getElementById('loadingSpinner');
  var noteEditor = document.getElementById('noteEditor');
  var noteEditorBack = document.getElementById('noteEditorBack');
  var noteEditorSave = document.getElementById('noteEditorSave');
  var noteEditorRef = document.getElementById('noteEditorRef');
  var noteEditorTextarea = document.getElementById('noteEditorTextarea');

  // ============================
  // UTIL: clear all children
  // ============================
  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  // ============================
  // UTIL: format date in Korean
  // ============================
  function formatDateKorean(dateStr) {
    var parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    return parseInt(parts[0], 10) + '년 ' + parseInt(parts[1], 10) + '월 ' + parseInt(parts[2], 10) + '일';
  }

  // ============================
  // UTIL: render note text with #date parsing
  // ============================
  function renderNoteText(text, container) {
    clearChildren(container);
    if (!text) return;

    var lines = text.split('\n');
    var currentText = [];

    function flushText() {
      if (currentText.length > 0) {
        var span = document.createElement('span');
        span.textContent = currentText.join('\n');
        container.appendChild(span);
        currentText = [];
      }
    }

    for (var i = 0; i < lines.length; i++) {
      var match = lines[i].match(/^#date:(\d{4}-\d{2}-\d{2})$/);
      if (match) {
        flushText();
        var divider = document.createElement('div');
        divider.className = 'note-date-divider';
        var dateSpan = document.createElement('span');
        dateSpan.textContent = formatDateKorean(match[1]);
        divider.appendChild(dateSpan);
        container.appendChild(divider);
      } else {
        currentText.push(lines[i]);
      }
    }
    flushText();
  }

  // ============================
  // SETTINGS PERSISTENCE (localStorage)
  // ============================
  var SETTINGS_KEY = 'bible-note-settings';

  function saveSettings() {
    var s = {
      bookIndex: state.bookIndex,
      chapter: state.chapter,
      lang: state.lang,
      fontFamily: state.fontFamily,
      fontWeight: state.fontWeight,
      fontSize: state.fontSize,
      lineHeight: state.lineHeight,
      versePadding: state.versePadding,
      sideMargin: state.sideMargin
    };
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
  }

  function loadSettings() {
    try {
      var raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (typeof s.bookIndex === 'number') state.bookIndex = s.bookIndex;
      if (typeof s.chapter === 'number') state.chapter = s.chapter;
      if (s.lang) state.lang = s.lang;
      if (s.fontFamily) state.fontFamily = s.fontFamily;
      if (s.fontWeight) state.fontWeight = s.fontWeight;
      if (typeof s.fontSize === 'number') state.fontSize = s.fontSize;
      if (typeof s.lineHeight === 'number') state.lineHeight = s.lineHeight;
      if (typeof s.versePadding === 'number') state.versePadding = s.versePadding;
      if (typeof s.sideMargin === 'number') state.sideMargin = s.sideMargin;
    } catch(e) {}
  }

  // ============================
  // HELPERS
  // ============================
  function getBookName(bookIndex, lang) {
    if (lang === 'ko') return KOREAN_BOOK_NAMES[bookIndex] || '';
    var data = bibleEn || bibleKo;
    if (data && data.books[bookIndex]) return data.books[bookIndex].name;
    return '';
  }

  function getChapterCount(bookIndex) {
    var data = bibleKo || bibleEn;
    if (!data || !data.books[bookIndex]) return 0;
    return data.books[bookIndex].chapters.length;
  }

  function getVerses(bookIndex, chapter, lang) {
    var data = lang === 'ko' ? bibleKo : bibleEn;
    if (!data || !data.books[bookIndex]) return null;
    var book = data.books[bookIndex];
    var ch = book.chapters.find(function(c) { return c.chapter === chapter; });
    if (!ch) return null;
    return ch.verses;
  }

  function buildVerseRef(bookIndex, chapter, verseNums, lang) {
    var name = getBookName(bookIndex, lang);
    var chapterLabel = lang === 'ko' ? '장' : '';
    var prefix = name + ' ' + chapter + chapterLabel + ':';

    if (!verseNums || verseNums.length === 0) return prefix.slice(0, -1);
    var sorted = verseNums.slice().sort(function(a, b) { return a - b; });

    var parts = [];
    var rangeStart = sorted[0], rangeEnd = sorted[0];
    for (var i = 1; i < sorted.length; i++) {
      if (sorted[i] === rangeEnd + 1) { rangeEnd = sorted[i]; }
      else {
        parts.push(rangeStart === rangeEnd ? '' + rangeStart : rangeStart + '-' + rangeEnd);
        rangeStart = sorted[i]; rangeEnd = sorted[i];
      }
    }
    parts.push(rangeStart === rangeEnd ? '' + rangeStart : rangeStart + '-' + rangeEnd);
    return prefix + parts.join(', ');
  }

  // ============================
  // SELECTION
  // ============================
  function clearSelection() {
    state.selectedVerses = [];
    document.querySelectorAll('.verse-text.selected').forEach(function(el) {
      el.classList.remove('selected');
    });
    actionBar.classList.remove('active');
    glassNav.style.opacity = '1';
    glassNav.style.pointerEvents = '';
  }

  function updateActionBar() {
    if (state.selectedVerses.length === 0) {
      actionBar.classList.remove('active');
      glassNav.style.opacity = '1';
      glassNav.style.pointerEvents = '';
    } else {
      actionRef.textContent = buildVerseRef(state.bookIndex, state.chapter, state.selectedVerses, state.lang);
      actionBar.classList.add('active');
      glassNav.style.opacity = '0';
      glassNav.style.pointerEvents = 'none';
    }
  }

  function toggleVerseSelection(verseNum, el) {
    var idx = state.selectedVerses.indexOf(verseNum);
    if (idx === -1) {
      state.selectedVerses.push(verseNum);
      el.classList.add('selected');
      el.classList.add('just-selected');
      setTimeout(function() { el.classList.remove('just-selected'); }, 400);
    } else {
      state.selectedVerses.splice(idx, 1);
      el.classList.remove('selected');
    }
    updateActionBar();
  }

  // ============================
  // RENDER VERSES
  // ============================
  function renderVerses() {
    var verses = getVerses(state.bookIndex, state.chapter, state.lang);
    var chapterLabel = state.lang === 'ko' ? '장' : '';
    var bookName = getBookName(state.bookIndex, state.lang);
    bookChapterBtn.textContent = bookName + ' ' + state.chapter + chapterLabel;

    document.getElementById('btnPrev').disabled = (state.chapter <= 1);
    document.getElementById('btnNext').disabled = (state.chapter >= getChapterCount(state.bookIndex));

    state.selectedVerses = [];
    actionBar.classList.remove('active');
    glassNav.style.opacity = '1';
    glassNav.style.pointerEvents = '';

    clearChildren(versesWrap);

    if (!verses || verses.length === 0) {
      var p = document.createElement('p');
      p.style.cssText = 'color:var(--text-muted);text-align:center;padding:3rem 1rem;font-size:14px;';
      p.textContent = state.lang === 'ko' ? '이 장의 데이터가 없습니다.' : 'No data available for this chapter.';
      versesWrap.appendChild(p);
      return;
    }

    // Query notes for this chapter to show dots
    db.notes.where({ book: String(state.bookIndex), chapter: state.chapter }).toArray().then(function(chapterNotes) {
      var notedVerses = new Set();
      chapterNotes.forEach(function(n) {
        for (var v = n.verse_start; v <= n.verse_end; v++) notedVerses.add(v);
      });

      verses.forEach(function(verseObj) {
        var verseNum = verseObj.verse;
        var text = verseObj.text.trim();

        var span = document.createElement('span');
        span.className = 'verse-block';
        if (verseNum > 1 && (verseNum - 1) % 5 === 0) {
          span.classList.add('rhythm-break');
        }
        if (notedVerses.has(verseNum)) {
          span.classList.add('has-note');
        }

        var num = document.createElement('sup');
        num.className = 'verse-num';
        num.textContent = verseNum;

        var txt = document.createElement('span');
        txt.className = 'verse-text';
        txt.textContent = text;
        txt.dataset.verse = verseNum;
        txt.style.fontFamily = state.fontFamily;
        txt.style.fontWeight = state.fontWeight;
        if (state.fontSize !== 16) txt.style.fontSize = state.fontSize + 'px';
        txt.style.lineHeight = state.lineHeight;

        txt.addEventListener('click', function() {
          toggleVerseSelection(verseNum, txt);
        });

        span.appendChild(num);
        span.appendChild(txt);

        if (notedVerses.has(verseNum)) {
          var dot = document.createElement('span');
          dot.className = 'verse-note-dot';
          span.appendChild(dot);
        }

        versesWrap.appendChild(span);
      });

      applyReadingSettingsToDOM();
    });

    saveSettings();
  }

  // ============================
  // FULL SCREEN NOTE EDITOR
  // ============================
  var editorIsTyping = false;
  var autoSaveTimer = null;
  var noteEditorStatus = document.getElementById('noteEditorStatus');

  function openNoteEditor(noteId, verseNums) {
    editorNoteId = noteId;
    editorVerses = verseNums;
    editorIsTyping = false;

    var ref = buildVerseRef(state.bookIndex, state.chapter, verseNums, state.lang);
    noteEditorRef.textContent = ref;
    noteEditorStatus.textContent = '';
    noteEditorStatus.classList.remove('visible');

    if (noteId) {
      db.notes.get(noteId).then(function(note) {
        noteEditorTextarea.value = note ? (note.text || '') : '';
        noteEditor.classList.add('active');
        // Don't auto-focus — show view mode first
        noteEditorTextarea.blur();
      });
    } else {
      noteEditorTextarea.value = '';
      noteEditor.classList.add('active');
      // New note — go straight to typing
      editorIsTyping = true;
      setTimeout(function() { noteEditorTextarea.focus(); }, 100);
    }
  }

  function closeNoteEditor() {
    noteEditor.classList.remove('active');
    noteEditorTextarea.blur();
    editorIsTyping = false;
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    // Refresh
    if (notePanel.classList.contains('active') && editorVerses) {
      var v = editorVerses;
      closeNotePanel();
      openNotePanel(v);
    }
    renderVerses();
    editorNoteId = null;
    editorVerses = null;
  }

  function autoSave() {
    var text = noteEditorTextarea.value;
    var now = new Date().toISOString();
    var today = now.split('T')[0];

    if (editorNoteId) {
      db.notes.update(editorNoteId, { text: text, date: today, updated_at: now }).then(function() {
        showSaveStatus();
      });
    } else if (editorVerses && text.trim()) {
      var sorted = editorVerses.slice().sort(function(a, b) { return a - b; });
      db.notes.add({
        book: String(state.bookIndex), chapter: state.chapter,
        verse_start: sorted[0], verse_end: sorted[sorted.length - 1],
        text: text, date: today, updated_at: now
      }).then(function(id) {
        editorNoteId = id; // Now it's an existing note
        showSaveStatus();
      });
    }
  }

  function showSaveStatus() {
    noteEditorStatus.textContent = 'Saved';
    noteEditorStatus.classList.add('visible');
    setTimeout(function() { noteEditorStatus.classList.remove('visible'); }, 1500);
  }

  // Autosave on input — debounced 1.5s
  noteEditorTextarea.addEventListener('input', function() {
    var ta = noteEditorTextarea;
    var val = ta.value;
    var pos = ta.selectionStart;

    // #date replacement
    var before = val.substring(0, pos);
    var dateMatch = before.match(/#date[\s\n]$/);
    if (dateMatch) {
      var today = new Date();
      var dateStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
      var replacement = '#date:' + dateStr;
      var matchStart = pos - dateMatch[0].length;
      var newVal = val.substring(0, matchStart) + replacement + '\n' + val.substring(pos);
      ta.value = newVal;
      var newPos = matchStart + replacement.length + 1;
      ta.selectionStart = newPos;
      ta.selectionEnd = newPos;
    }

    // Debounced autosave
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(autoSave, 1500);
  });

  // Tap textarea → enter typing mode
  noteEditorTextarea.addEventListener('focus', function() {
    editorIsTyping = true;
  });

  // Back button — 2 stages
  noteEditorBack.addEventListener('click', function() {
    if (editorIsTyping) {
      // Stage 1: stop typing, blur textarea (view mode)
      noteEditorTextarea.blur();
      editorIsTyping = false;
      // Force save immediately
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      var text = noteEditorTextarea.value.trim();
      if (text) {
        autoSave();
      } else if (editorNoteId) {
        // Empty note — delete it
        db.notes.delete(editorNoteId).then(function() {
          closeNoteEditor();
        });
        return;
      }
    } else {
      // Stage 2: close editor, go back to verses
      closeNoteEditor();
    }
  });

  // ============================
  // NOTE PANEL
  // ============================
  function openNotePanel(verseNums) {
    var sorted = verseNums.slice().sort(function(a, b) { return a - b; });
    var ref = buildVerseRef(state.bookIndex, state.chapter, sorted, state.lang);
    notePanelRef.textContent = ref;

    var verses = getVerses(state.bookIndex, state.chapter, state.lang) || [];

    clearChildren(notePanelBody);

    // Quote
    var quoteTexts = sorted.map(function(vn) {
      var v = verses.find(function(vv) { return vv.verse === vn; });
      return vn + '. ' + (v ? v.text.trim() : '');
    });
    var quote = document.createElement('div');
    quote.className = 'note-verse-quote';
    quote.textContent = quoteTexts.join('\n');
    notePanelBody.appendChild(quote);

    // Query overlapping notes
    db.notes.where({ book: String(state.bookIndex), chapter: state.chapter }).toArray().then(function(chapterNotes) {
      var verseNotes = chapterNotes.filter(function(n) {
        return sorted.some(function(v) { return v >= n.verse_start && v <= n.verse_end; });
      });
      verseNotes.sort(function(a, b) { return (b.updated_at || b.date).localeCompare(a.updated_at || a.date); });

      if (verseNotes.length > 0) {
        verseNotes.forEach(function(n) {
          notePanelBody.appendChild(makeNoteItem(n, sorted));
        });
      }

      // Footer
      var footer = document.createElement('div');
      footer.className = 'note-panel-footer';
      var addBtn = document.createElement('button');
      addBtn.className = 'note-add-btn';
      addBtn.textContent = '+ Add Note';
      addBtn.addEventListener('click', function() {
        // Open full screen editor for a new note
        openNoteEditor(null, sorted);
      });
      footer.appendChild(addBtn);
      notePanelBody.appendChild(footer);

      // If no notes yet, go directly to editor
      if (verseNotes.length === 0) {
        openNoteEditor(null, sorted);
      }
    });

    noteOverlay.classList.add('active');
    notePanel.classList.add('active');
  }

  function makeNoteItem(n, sorted) {
    var item = document.createElement('div');
    item.className = 'note-item';
    var inner = document.createElement('div');
    inner.className = 'note-item-inner';
    var dateEl = document.createElement('div');
    dateEl.className = 'note-date';
    var rangeStr = n.verse_start === n.verse_end ? ':' + n.verse_start : ':' + n.verse_start + '-' + n.verse_end;
    dateEl.textContent = n.date + '  \u00B7  ' + rangeStr;

    var rendered = document.createElement('div');
    rendered.className = 'note-rendered';
    renderNoteText(n.text, rendered);

    inner.appendChild(dateEl);
    inner.appendChild(rendered);
    item.appendChild(inner);

    // Tap note to open full-screen editor
    inner.addEventListener('click', function() {
      openNoteEditor(n.id, sorted);
    });

    return item;
  }

  function closeNotePanel() {
    noteOverlay.classList.remove('active');
    notePanel.classList.remove('active');
    clearSelection();
  }

  noteOverlay.addEventListener('click', closeNotePanel);
  document.getElementById('notePanelClose').addEventListener('click', closeNotePanel);

  // ============================
  // ACTION BAR
  // ============================
  document.getElementById('actionNoteBtn').addEventListener('click', function() {
    if (state.selectedVerses.length > 0) {
      openNotePanel(state.selectedVerses.slice());
    }
  });
  document.getElementById('actionCancelBtn').addEventListener('click', clearSelection);

  // ============================
  // BOOK SELECTOR
  // ============================
  var selectorTab = 'ot';
  var selectorPhase = 'book';
  var selectorBookIndex = null;

  function openBookSelector() {
    selectorPhase = 'book';
    selectorTab = state.bookIndex < OT_COUNT ? 'ot' : 'nt';
    bookSelector.classList.add('active');
    renderBookList();
  }

  function renderBookList() {
    clearChildren(bookSelectorBody);

    var tabs = bookSelector.querySelectorAll('.tab');
    tabs.forEach(function(t) { t.classList.toggle('active', t.dataset.tab === selectorTab); });

    if (selectorPhase !== 'book') return;

    var startIdx = selectorTab === 'ot' ? 0 : OT_COUNT;
    var endIdx = selectorTab === 'ot' ? OT_COUNT : 66;

    var grid = document.createElement('div');
    grid.className = 'book-grid';

    for (var i = startIdx; i < endIdx; i++) {
      (function(idx) {
        var item = document.createElement('div');
        item.className = 'book-item';
        item.textContent = getBookName(idx, state.lang);
        item.addEventListener('click', function() {
          selectorBookIndex = idx;
          selectorPhase = 'chapter';
          renderChapterGrid();
        });
        grid.appendChild(item);
      })(i);
    }
    bookSelectorBody.appendChild(grid);
  }

  function renderChapterGrid() {
    clearChildren(bookSelectorBody);
    var count = getChapterCount(selectorBookIndex);

    var label = document.createElement('div');
    label.style.cssText = 'font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;';
    var backBtn = document.createElement('span');
    backBtn.textContent = '\u2190 ';
    backBtn.style.cssText = 'cursor:pointer;color:var(--text-dim);';
    backBtn.addEventListener('click', function() {
      selectorPhase = 'book';
      renderBookList();
    });
    label.appendChild(backBtn);
    label.appendChild(document.createTextNode(getBookName(selectorBookIndex, state.lang)));
    bookSelectorBody.appendChild(label);

    var grid = document.createElement('div');
    grid.className = 'chapter-grid';
    for (var i = 1; i <= count; i++) {
      (function(ch) {
        var item = document.createElement('div');
        item.className = 'chapter-item';
        item.textContent = ch;
        item.addEventListener('click', function() {
          state.bookIndex = selectorBookIndex;
          state.chapter = ch;
          bookSelector.classList.remove('active');
          renderVerses();
          mainContent.scrollTop = 0;
        });
        grid.appendChild(item);
      })(i);
    }
    bookSelectorBody.appendChild(grid);
  }

  bookSelector.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      selectorTab = tab.dataset.tab;
      selectorPhase = 'book';
      renderBookList();
    });
  });

  document.getElementById('bookSelectorClose').addEventListener('click', function() {
    bookSelector.classList.remove('active');
  });

  bookChapterBtn.addEventListener('click', openBookSelector);

  // ============================
  // CHAPTER NAV
  // ============================
  document.getElementById('btnPrev').addEventListener('click', function() {
    if (state.chapter > 1) {
      state.chapter--;
      renderVerses();
      mainContent.scrollTop = 0;
    }
  });

  document.getElementById('btnNext').addEventListener('click', function() {
    if (state.chapter < getChapterCount(state.bookIndex)) {
      state.chapter++;
      renderVerses();
      mainContent.scrollTop = 0;
    }
  });

  // ============================
  // ALL NOTES
  // ============================
  document.getElementById('allNotesClose').addEventListener('click', function() {
    allNotesPanel.classList.remove('active');
  });

  function renderAllNotes() {
    clearChildren(allNotesBody);

    db.notes.toArray().then(function(allNotes) {
      allNotes = allNotes.filter(function(n) { return n.text && n.text.trim(); });

      if (allNotes.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'note-empty';
        empty.textContent = state.lang === 'ko' ? '아직 노트가 없습니다.' : 'No notes yet.';
        allNotesBody.appendChild(empty);
        return;
      }

      var sorted = allNotes.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
      var groups = {};
      sorted.forEach(function(n) {
        var d = n.date || 'undated';
        if (!groups[d]) groups[d] = [];
        groups[d].push(n);
      });

      Object.keys(groups).sort().reverse().forEach(function(date) {
        var group = document.createElement('div');
        group.className = 'all-notes-date-group';

        var dateLabel = document.createElement('div');
        dateLabel.className = 'all-notes-date';
        dateLabel.textContent = date;
        group.appendChild(dateLabel);

        groups[date].forEach(function(n) {
          var card = document.createElement('div');
          card.className = 'all-notes-card';

          var ref = document.createElement('div');
          ref.className = 'all-notes-ref';
          var bookIdx = parseInt(n.book, 10);
          var chLabel = state.lang === 'ko' ? '장' : '';
          var vRef = n.verse_start === n.verse_end ? ':' + n.verse_start : ':' + n.verse_start + '-' + n.verse_end;
          ref.textContent = getBookName(bookIdx, state.lang) + ' ' + n.chapter + chLabel + vRef;

          var preview = document.createElement('div');
          preview.className = 'all-notes-preview';
          // Strip #date: lines for preview
          var previewText = (n.text || '').replace(/#date:\d{4}-\d{2}-\d{2}/g, '').trim();
          preview.textContent = previewText;

          card.appendChild(ref);
          card.appendChild(preview);

          card.addEventListener('click', function() {
            allNotesPanel.classList.remove('active');
            state.bookIndex = bookIdx;
            state.chapter = n.chapter;
            renderVerses();
            setTimeout(function() {
              var vs = [];
              for (var v = n.verse_start; v <= n.verse_end; v++) vs.push(v);
              openNotePanel(vs);
            }, 100);
          });

          group.appendChild(card);
        });

        allNotesBody.appendChild(group);
      });
    });
  }

  // ============================
  // SETTINGS PANEL
  // ============================
  document.getElementById('btnSettings').addEventListener('click', function(e) {
    e.stopPropagation();
    settingsPanel.classList.toggle('active');
  });

  document.addEventListener('click', function(e) {
    if (settingsPanel.classList.contains('active') &&
        !settingsPanel.contains(e.target) &&
        e.target.id !== 'btnSettings' &&
        !e.target.closest('#btnSettings')) {
      settingsPanel.classList.remove('active');
    }
  });

  mainContent.addEventListener('scroll', function() {
    if (settingsPanel.classList.contains('active')) {
      settingsPanel.classList.remove('active');
    }
  });

  settingsPanel.addEventListener('click', function(e) { e.stopPropagation(); });

  // Language toggle
  document.getElementById('langKo').addEventListener('click', function() {
    state.lang = 'ko';
    this.classList.add('active');
    document.getElementById('langEn').classList.remove('active');
    renderVerses();
    saveSettings();
  });
  document.getElementById('langEn').addEventListener('click', function() {
    state.lang = 'en';
    this.classList.add('active');
    document.getElementById('langKo').classList.remove('active');
    renderVerses();
    saveSettings();
  });

  // Font selection
  document.querySelectorAll('.font-option').forEach(function(opt) {
    opt.addEventListener('click', function() {
      state.fontFamily = opt.dataset.font;
      state.fontWeight = opt.dataset.weight;
      document.querySelectorAll('.verse-text').forEach(function(el) {
        el.style.fontFamily = state.fontFamily;
        el.style.fontWeight = state.fontWeight;
      });
      document.querySelectorAll('.font-option').forEach(function(o) { o.classList.remove('selected'); });
      opt.classList.add('selected');
      saveSettings();
    });
  });

  // Font size
  function applyFontSize() {
    document.querySelectorAll('.verse-text').forEach(function(el) {
      el.style.fontSize = state.fontSize + 'px';
    });
    document.getElementById('fontSizeLabel').textContent = state.fontSize + 'px';
    saveSettings();
  }

  document.getElementById('fontSizeDown').addEventListener('click', function() {
    if (state.fontSize > 12) { state.fontSize -= 1; applyFontSize(); }
  });
  document.getElementById('fontSizeUp').addEventListener('click', function() {
    if (state.fontSize < 24) { state.fontSize += 1; applyFontSize(); }
  });

  // Line height
  document.getElementById('lineHeightDown').addEventListener('click', function() {
    if (state.lineHeight > 1.4) {
      state.lineHeight = Math.round((state.lineHeight - 0.1) * 10) / 10;
      applyReadingSettings();
    }
  });
  document.getElementById('lineHeightUp').addEventListener('click', function() {
    if (state.lineHeight < 3.0) {
      state.lineHeight = Math.round((state.lineHeight + 0.1) * 10) / 10;
      applyReadingSettings();
    }
  });

  // Verse padding
  document.getElementById('versePaddingDown').addEventListener('click', function() {
    if (state.versePadding > 0.2) {
      state.versePadding = Math.round((state.versePadding - 0.2) * 10) / 10;
      applyReadingSettings();
    }
  });
  document.getElementById('versePaddingUp').addEventListener('click', function() {
    if (state.versePadding < 2.5) {
      state.versePadding = Math.round((state.versePadding + 0.2) * 10) / 10;
      applyReadingSettings();
    }
  });

  // Side margin
  document.getElementById('sideMarginDown').addEventListener('click', function() {
    if (state.sideMargin > 1) {
      state.sideMargin = Math.round((state.sideMargin - 0.5) * 10) / 10;
      applyReadingSettings();
    }
  });
  document.getElementById('sideMarginUp').addEventListener('click', function() {
    if (state.sideMargin < 6) {
      state.sideMargin = Math.round((state.sideMargin + 0.5) * 10) / 10;
      applyReadingSettings();
    }
  });

  function applyReadingSettings() {
    document.getElementById('lineHeightLabel').textContent = state.lineHeight.toFixed(1);
    document.getElementById('versePaddingLabel').textContent = state.versePadding.toFixed(1) + 'rem';
    document.getElementById('sideMarginLabel').textContent = state.sideMargin.toFixed(1) + 'rem';
    applyReadingSettingsToDOM();
    saveSettings();
  }

  function applyReadingSettingsToDOM() {
    document.querySelectorAll('.verse-text').forEach(function(el) {
      el.style.lineHeight = state.lineHeight;
    });
    document.querySelectorAll('.verse-block').forEach(function(el) {
      el.style.marginBottom = state.versePadding + 'rem';
    });
    versesWrap.style.paddingLeft = state.sideMargin + 'rem';
    versesWrap.style.paddingRight = state.sideMargin + 'rem';
  }

  // All notes from settings
  document.getElementById('settingsAllNotes').addEventListener('click', function() {
    settingsPanel.classList.remove('active');
    renderAllNotes();
    allNotesPanel.classList.add('active');
  });

  // ============================
  // SCROLL HIDE/SHOW NAV
  // ============================
  var lastScrollTop = 0;
  var navHidden = false;

  mainContent.addEventListener('scroll', function() {
    var st = mainContent.scrollTop;
    if (state.selectedVerses.length > 0) { lastScrollTop = st; return; }

    if (st > lastScrollTop && st > 80 && !navHidden) {
      glassNav.style.transform = 'translateY(calc(100% + 20px))';
      navHidden = true;
    } else if (st < lastScrollTop && navHidden) {
      glassNav.style.transform = 'translateY(0)';
      navHidden = false;
    }
    lastScrollTop = st;
  });

  // ============================
  // RESTORE UI STATE FROM SETTINGS
  // ============================
  function restoreUIState() {
    if (state.lang === 'en') {
      document.getElementById('langEn').classList.add('active');
      document.getElementById('langKo').classList.remove('active');
    }

    document.querySelectorAll('.font-option').forEach(function(opt) {
      if (opt.dataset.font === state.fontFamily) {
        opt.classList.add('selected');
      } else {
        opt.classList.remove('selected');
      }
    });

    document.getElementById('fontSizeLabel').textContent = state.fontSize + 'px';
    document.getElementById('lineHeightLabel').textContent = state.lineHeight.toFixed(1);
    document.getElementById('versePaddingLabel').textContent = state.versePadding.toFixed(1) + 'rem';
    document.getElementById('sideMarginLabel').textContent = state.sideMargin.toFixed(1) + 'rem';
  }

  // ============================
  // LOAD BIBLE DATA
  // ============================
  function showLoadError(msg) {
    loadingText.style.display = 'none';
    loadingSpinner.style.display = 'none';

    var errDiv = document.createElement('div');
    errDiv.className = 'loading-error';

    var p1 = document.createElement('p');
    p1.textContent = msg;
    errDiv.appendChild(p1);

    var p2 = document.createElement('p');
    p2.style.marginTop = '12px';
    p2.textContent = 'file:// protocol blocks fetch. Try a local server:';
    errDiv.appendChild(p2);

    var code = document.createElement('code');
    code.textContent = 'cd note-bible && python3 -m http.server 8000';
    errDiv.appendChild(code);

    var p3 = document.createElement('p');
    p3.style.marginTop = '8px';
    var link = document.createElement('span');
    link.style.color = 'var(--text)';
    link.textContent = 'Then open http://localhost:8000';
    p3.appendChild(link);
    errDiv.appendChild(p3);

    loadingScreen.appendChild(errDiv);
  }

  function init() {
    loadSettings();

    Promise.all([
      fetch('./data/krv.json').then(function(r) {
        if (!r.ok) throw new Error('KRV: ' + r.status);
        return r.json();
      }),
      fetch('./data/kjv.json').then(function(r) {
        if (!r.ok) throw new Error('KJV: ' + r.status);
        return r.json();
      })
    ]).then(function(results) {
      bibleKo = results[0];
      bibleEn = results[1];

      if (!bibleKo.books || bibleKo.books.length !== 66) {
        throw new Error('KRV data invalid: expected 66 books, got ' + (bibleKo.books ? bibleKo.books.length : 0));
      }
      if (!bibleEn.books || bibleEn.books.length !== 66) {
        throw new Error('KJV data invalid: expected 66 books, got ' + (bibleEn.books ? bibleEn.books.length : 0));
      }

      if (state.bookIndex < 0 || state.bookIndex >= 66) state.bookIndex = 0;
      if (state.chapter < 1 || state.chapter > getChapterCount(state.bookIndex)) state.chapter = 1;

      loadingScreen.classList.add('hidden');
      setTimeout(function() { loadingScreen.style.display = 'none'; }, 400);

      restoreUIState();
      renderVerses();

    }).catch(function(err) {
      console.error('Failed to load Bible data:', err);
      showLoadError('Failed to load Bible data: ' + err.message);
    });
  }

  init();

})();
</script>
</body>
</html>
